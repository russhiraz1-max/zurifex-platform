<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Task - Zurifex 🇰🇪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
        }
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(10, 30, 80, 0.6), transparent 60%),
                        radial-gradient(ellipse at 80% 50%, rgba(80, 20, 60, 0.3), transparent 50%),
                        #0a0a1a;
        }
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 40px;
            background: rgba(10, 10, 30, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span { -webkit-text-fill-color: initial; color: #fff; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .btn-back {
            padding: 8px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .dashboard {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 40px 60px;
        }
        .card {
            background: rgba(20, 20, 50, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 32px 40px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .card h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .card .sub { color: rgba(255,255,255,0.4); margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 15px;
            transition: 0.3s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-group select option { background: #1a1a2e; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59, 130, 246, 0.3); }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .error-msg {
            display: none;
            color: #f87171;
            background: rgba(248, 113, 113, 0.08);
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 12px;
            border: 1px solid rgba(248, 113, 113, 0.15);
        }
        .error-msg.show { display: block; }
        .success-msg {
            display: none;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.08);
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 12px;
            border: 1px solid rgba(74, 222, 128, 0.15);
        }
        .success-msg.show { display: block; }
        .credit { text-align: center; padding: 20px; color: rgba(255,255,255,0.15); font-size: 13px; }
        .credit .brand { color: #60a5fa; }
        @media (max-width: 768px) {
            nav { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
            .dashboard { padding: 16px; }
            .card { padding: 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="bg-canvas"></div>

<nav>
    <div class="logo"><span>🇰🇪</span>Zurifex</div>
    <div class="nav-right">
        <a href="dashboard-advertisor.html" class="btn-back">← Back</a>
    </div>
</nav>

<div class="dashboard">
    <div class="card">
        <h1>📝 Post a New Task</h1>
        <p class="sub">Create a task and get freelancers to complete it.</p>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg">✅ Task created successfully! Pending admin approval.</div>

        <form id="taskForm">
            <div class="form-group">
                <label>Task Title *</label>
                <input type="text" id="title" placeholder="e.g., Watch 5 YouTube Videos" required>
            </div>

            <div class="form-group">
                <label>Description *</label>
                <textarea id="description" placeholder="Describe what freelancers need to do" required></textarea>
            </div>

            <div class="form-group">
                <label>Category *</label>
                <select id="category" required>
                    <option value="">Select category...</option>
                    <option value="app_testing">App Testing</option>
                    <option value="content_writing">Content Writing</option>
                    <option value="social_media">Social Media</option>
                    <option value="video_watching">Video Watching</option>
                    <option value="data_entry">Data Entry</option>
                    <option value="web_research">Web Research</option>
                    <option value="design">Design</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Budget Per Completion ($) *</label>
                    <input type="number" id="budgetPerCompletion" placeholder="0.50" step="0.01" min="0.01" required>
                </div>
                <div class="form-group">
                    <label>Max Completions *</label>
                    <input type="number" id="maxCompletions" placeholder="50" min="1" required>
                </div>
            </div>

            <div class="form-group">
                <label>Total Budget ($)</label>
                <input type="text" id="totalBudget" readonly style="background:rgba(0,0,0,0.5);">
                <small style="color:rgba(255,255,255,0.3);font-size:12px;">Calculated automatically: budget × max completions</small>
            </div>

            <div class="form-group">
                <label>Instructions (Optional)</label>
                <textarea id="instructions" placeholder="Any special instructions for freelancers"></textarea>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">🚀 Create Task</button>
        </form>
    </div>

    <div class="credit">
        Built by <span class="brand">Rshiraz</span> 🇰🇪 &nbsp;|&nbsp; © 2026 Zurifex
    </div>
</div>

<script>
    const API_URL = 'http://localhost:5000';
    const user = JSON.parse(localStorage.getItem('zurifex_user') || 'null');
    if (!user) window.location.href = 'login.html';

    if (!user.is_approved) {
        document.getElementById('errorMsg').textContent = '⛔ Your account is pending admin approval. You cannot post tasks yet.';
        document.getElementById('errorMsg').classList.add('show');
        document.getElementById('submitBtn').disabled = true;
    }

    // Auto-calculate total budget
    document.getElementById('budgetPerCompletion').addEventListener('input', calculateTotal);
    document.getElementById('maxCompletions').addEventListener('input', calculateTotal);

    function calculateTotal() {
        const budget = parseFloat(document.getElementById('budgetPerCompletion').value) || 0;
        const completions = parseInt(document.getElementById('maxCompletions').value) || 0;
        document.getElementById('totalBudget').value = (budget * completions).toFixed(2);
    }

    // Form submit
    document.getElementById('taskForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const submitBtn = document.getElementById('submitBtn');

        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Creating task...';

        try {
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const category = document.getElementById('category').value;
            const budgetPerCompletion = parseFloat(document.getElementById('budgetPerCompletion').value);
            const maxCompletions = parseInt(document.getElementById('maxCompletions').value);
            const totalBudget = parseFloat(document.getElementById('totalBudget').value);
            const instructions = document.getElementById('instructions').value;

            const res = await fetch(`${API_URL}/api/tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title,
                    description,
                    category,
                    budget_per_completion: budgetPerCompletion,
                    total_budget: totalBudget,
                    max_completions: maxCompletions,
                    advertisor_id: user.id,
                    instructions,
                    completion_requirements: 'Submit proof of completion'
                })
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.error || 'Failed to create task');
            }

            successMsg.classList.add('show');
            document.getElementById('taskForm').reset();
            document.getElementById('totalBudget').value = '';
            setTimeout(() => {
                window.location.href = 'dashboard-advertisor.html';
            }, 2500);

        } catch (error) {
            errorMsg.textContent = '❌ ' + error.message;
            errorMsg.classList.add('show');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '🚀 Create Task';
        }
    });
</script>

<script>
    // Error logging system
    const LOG_KEY = 'zurifex_error_logs';

    function logError(type, message, details = null) {
        const logs = JSON.parse(localStorage.getItem(LOG_KEY) || '[]');
        logs.unshift({
            id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            timestamp: new Date().toISOString(),
            type: type,
            message: message,
            details: details,
            user: JSON.parse(localStorage.getItem('zurifex_user') || 'null'),
            url: window.location.href
        });
        if (logs.length > 500) logs.pop();
        localStorage.setItem(LOG_KEY, JSON.stringify(logs));
        console.error(`[${type.toUpperCase()}]`, message, details);
    }

    // Auto-catch console errors
    const origError = console.error;
    console.error = function(...args) {
        origError.apply(console, args);
        const msg = args.map(a => typeof a === 'string' ? a : JSON.stringify(a)).join(' ');
        if (msg.includes('Error') || msg.includes('Failed') || msg.includes('404') || msg.includes('500')) {
            logError('frontend', msg, { args: args });
        }
    };

    // Catch unhandled errors
    window.onerror = function(message, source, lineno, colno, error) {
        logError('frontend', message, { source, line: lineno, column: colno, stack: error?.stack });
        return false;
    };

    window.onunhandledrejection = function(event) {
        logError('frontend', 'Unhandled Promise Rejection', { reason: String(event.reason) });
    };
</script>

</body>
</html>
